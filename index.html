<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rehab Voice Timer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { margin-bottom: 24px; color: #4a5568; font-size: 24px; }
        .status-display {
            font-size: 48px;
            font-weight: bold;
            color: #3182ce;
            margin: 20px 0;
            min-height: 70px;
        }
        .info-display {
            font-size: 20px;
            color: #4a5568;
            margin-bottom: 30px;
        }
        button {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover { background-color: #2b6cb0; }
        button:disabled { background-color: #cbd5e0; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">Rehab Timer</h1>
    <div class="status-display" id="status">-</div>
    <div class="info-display" id="info"></div>
    <button id="startBtn">Start</button>
</div>

<script src="app.js"></script>
</body>
</html>
