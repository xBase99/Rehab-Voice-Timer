<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rehab Voice Timer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 { margin-bottom: 20px; color: #4a5568; font-size: 24px; }
        
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            text-align: left;
        }
        .input-group label {
            font-size: 14px;
            color: #4a5568;
            font-weight: 500;
            flex: 1;
        }
        .input-group input {
            width: 80px;
            padding: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }
        
        /* [추가] 시각적 원형 시계 스타일 */
        .timer-circle-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 20px auto;
        }
        .timer-svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }
        .timer-bg {
            fill: none;
            stroke: #edf2f7;
            stroke-width: 8;
        }
        .timer-progress {
            fill: none;
            stroke: #3182ce;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 440;
            stroke-dashoffset: 0;
            transition: stroke-dashoffset 0.1s linear;
        }
        
        .status-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 42px;
            font-weight: bold;
            color: #3182ce;
            margin: 0;
        }
        
        .info-display {
            font-size: 18px;
            color: #4a5568;
            margin-bottom: 20px;
            min-height: 27px;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #startBtn { background-color: #3182ce; }
        #startBtn:hover { background-color: #2b6cb0; }
        #startBtn:disabled { background-color: #cbd5e0; cursor: not-allowed; }
        
        #stopBtn { background-color: #e53e3e; display: none; }
        #stopBtn:hover { background-color: #c53030; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">Rehab Timer</h1>
    
    <div class="input-group">
        <label id="lblSets" for="inputSets">목표 세트 수</label>
        <input type="number" id="inputSets" value="3" min="1">
    </div>
    <div class="input-group">
        <label id="lblReps" for="inputReps">세트당 횟수</label>
        <input type="number" id="inputReps" value="10" min="1">
    </div>
    <div class="input-group">
        <label id="lblInterval" for="inputInterval">카운트 간격 (초)</label>
        <input type="number" id="inputInterval" value="3" min="2">
    </div>
    <div class="input-group">
        <label id="lblRest" for="inputRest">세트 간 휴식 (초)</label>
        <input type="number" id="inputRest" value="5" min="0">
    </div>

    <div class="timer-circle-container">
        <svg class="timer-svg" viewBox="0 0 150 150">
            <circle class="timer-bg" cx="75" cy="75" r="70"></circle>
            <circle class="timer-progress" id="progressCircle" cx="75" cy="75" r="70"></circle>
        </svg>
        <div class="status-display" id="status">-</div>
    </div>
    
    <div class="info-display" id="info"></div>
    
    <div class="btn-group">
        <button id="startBtn">Start</button>
        <button id="stopBtn">Stop</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
